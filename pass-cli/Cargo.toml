[package]
name = "pass-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
pass = { path = "../pass" }
pass-domain = { path = "../pass-domain" }
pass-fs = { path = "../pass-fs" }
pass-pgp = { path = "../pass-pgp" }

clap = { version = "4.5", features = ["derive"] }
handlebars = "6.3.2"
libc = "0.2"
regex = "1.10"
rpassword = "7.3.1"
tracing-subscriber = { version = "0.3", features = ["default"] }

anyhow.workspace = true
async-trait.workspace = true
chrono.workspace = true
muon.workspace = true
proton-crypto.workspace = true
proton-crypto-account.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true

[dev-dependencies]
tempfile = "3.8"

[features]
default = []
internal = []