[workspace]
members = [
    "pass-cli",
    "pass-domain",
    "pass-fs",
    "pass-pgp",
    "pass"
]
resolver = "2"

[workspace.dependencies]
muon = { version = "1.7.1", registry = "proton", features = ["unsealed", "util", "testing-runner", "testing-server"] }
proton-crypto = { git = "ssh://git@gitlab.protontech.ch/rust/proton-crypto-rs.git", rev = "2ccbd848a6398b913a5d5babbbe9705661ecde7f" }
proton-crypto-account = { git = "ssh://git@gitlab.protontech.ch/rust/proton-crypto-rs.git", rev = "2ccbd848a6398b913a5d5babbbe9705661ecde7f" }
proton-pass-common = {  git = "ssh://git@gitlab.protontech.ch/proton/clients/pass/proton-pass-common.git", tag = "0.25.9" }

anyhow = "1.0"
async-trait = "0.1"
bytes = "1.10.1"
chrono = "0.4.40"
protobuf = "3.7.2"
protobuf-codegen = "3.7.2"
rand = "0.9.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tokio = { version = "1.47.0", features = ["full"] }
zeroize = { version = "1.8", features = ["derive"] }
