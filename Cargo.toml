[workspace]
members = [
    "pass-cli",
    "pass-domain",
    "pass-fs",
    "pass-pgp",
    "pass"
]
resolver = "2"

[workspace.dependencies]
muon = { version = "1.8.0", registry = "proton", features = ["tls-tokio-rustls", "unsealed", "util", "testing-runner", "testing-server", "other-platform"] }

# Rust crypto
# proton-crypto = { git = "ssh://git@gitlab.protontech.ch/rust/proton-crypto-rs.git", rev = "95305a122068d6db8aa2d2835c10687b9c507c07" }
# proton-crypto-account = { git = "ssh://git@gitlab.protontech.ch/rust/proton-crypto-rs.git", rev = "95305a122068d6db8aa2d2835c10687b9c507c07" }

# Golang crypto
proton-crypto = { git = "ssh://git@gitlab.protontech.ch/rust/proton-crypto-rs.git", tag = "release-2025-08-09" }
proton-crypto-account = { git = "ssh://git@gitlab.protontech.ch/rust/proton-crypto-rs.git", tag = "release-2025-08-09" }

proton-pass-common = {  git = "ssh://git@gitlab.protontech.ch/proton/clients/pass/proton-pass-common.git", tag = "0.27.0" }

anyhow = "1.0"
async-trait = "0.1"
bytes = "1.10.1"
chrono = { version = "0.4.40", features = ["serde"] }
futures = "0.3"
protobuf = "3.7.2"
protobuf-codegen = "3.7.2"
rand = "0.9.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tokio = { version = "1.47.0", features = ["full"] }
uuid = { version = "1.18", features = ["v4", "js"] }
zeroize = { version = "1.8", features = ["derive"] }
